name: Generate Monthly Picks (1st of month)

on:
  schedule:
    # Runs at 9:30 AM ET on the 1st of every month
    - cron: '30 13 1 * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  generate-picks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pandas numpy yfinance requests lxml python-dateutil
      
      - name: Generate monthly picks
        run: |
          cd $GITHUB_WORKSPACE
          python sp500_momentum.py --top-n 10 --years 10 --refresh
      
      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -f sp500_cache/picks_*.csv sp500_cache/backtest_*.csv sp500_cache/enhanced_*.csv
          git diff --cached --quiet || git commit -m "Monthly picks generated on $(date -u +%Y-%m-%d)"
          git push
